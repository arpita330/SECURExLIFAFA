<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdrawal Slideshow</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f8f9fa;
            text-align: center;
        }

        .slideshow-container {
            position: relative;
            max-width: 600px;
            margin: auto;
        }

        .slide {
            display: none;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            width: auto;
            padding: 10px;
            margin-top: -22px;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s ease;
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.5);
        }

        .prev {
            left: 10px;
        }

        .next {
            right: 10px;
        }

        .fade {
            animation: fadeEffect 1.5s;
        }

        @keyframes fadeEffect {
            from {opacity: 0.4} 
            to {opacity: 1}
        }
    </style>
</head>
<body>

    <div class="slideshow-container">
        <div class="slide fade">
            <img src="images/banner1.png" alt="Withdrawal Success">
        </div>
        <div class="slide fade">
            <img src="images/banner2.png" alt="Money Transfer">
        </div>
        <div class="slide fade">
            <img src="images/banner3.png" alt="Digital Wallet Transaction">
        </div>
        <div class="slide fade">
            <img src="images/banner4.png" alt="Digital Wallet Transaction">
        </div>

        <!-- Next and previous buttons -->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    <script>
        let slideIndex = 0;
        showSlides();

        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slideIndex++;
            if (slideIndex > slides.length) {
                slideIndex = 1;
            }
            slides[slideIndex - 1].style.display = "block";
            setTimeout(showSlides, 3000); // Change image every 3 seconds
        }

        function plusSlides(n) {
            slideIndex += n;
            let slides = document.getElementsByClassName("slide");
            if (slideIndex > slides.length) {
                slideIndex = 1;
            } else if (slideIndex < 1) {
                slideIndex = slides.length;
            }
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slides[slideIndex - 1].style.display = "block";
        }
    </script>

</body>
</html>
